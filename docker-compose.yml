version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agency-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agency}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}
      POSTGRES_DB: ${POSTGRES_DB:-agency_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
